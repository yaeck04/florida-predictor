matrix:
  include:
    # ... tus actuales ...
    
    # ➕ AGREGAR LINUX:
    - name: linux-app
      display_name: "🐧 Linux App"
      runner: ubuntu-latest
      build_cmd: "flet build linux"
      artifact_path: "build/linux"
      artifact_pattern: "*"  # Linux suele ser una carpeta entera
      needs_linux_deps: true  # Requiere instalar dependencias
      
    # ➕ AGREGAR WEB:
    - name: web-pwa
      display_name: "🌐 Web PWA"
      runner: ubuntu-latest
      build_cmd: "flet build web"
      artifact_path: "build/web"
      artifact_pattern: "*"
      needs_linux_deps: false
