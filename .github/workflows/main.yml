name: Build Android & Windows

on:
  # Runs on push to any of the below branches
  push:
    branches:
      - master
      - main
  # Runs on pull request events that target one of the below branches
  pull_request:
    branches:
      - master
      - main

  # Allows you to run this workflow manually from the Actions tab of the repository
  workflow_dispatch:

env:
  # https://flet.dev/docs/publish#versioning
  BUILD_NUMBER: 1
  BUILD_VERSION: 7.0.0
  PYTHON_VERSION: "3.11"
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ============================================
  # 🔷 JOB 1: ANDROID APK
  # ============================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@v4.2.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flet Build APK
        run: |
          flutter config --no-analytics
          flet build apk --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: android-apk
          path: build/apk
          if-no-files-found: error
          overwrite: false

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          tag_name: v${{ env.BUILD_VERSION }}.${{ github.run_number }}
          release_name: Release v${{ env.BUILD_VERSION }}.${{ github.run_number }}
          body: |
            ## 🎰 Florida Predictor v${{ env.BUILD_VERSION }}
            
            ### ✅ Cambios en esta versión:
            - Análisis de Centena/Decena/Unidad
            - Top 10 Fijos frecuentes
            - Análisis de Cuadrantes
            - Detección de Tendencias
            - Estrategia de Serie de Decena
            - Actualización de BD en tiempo real
            
            ### 📱 Plataformas:
            - ✅ Android (APK)
            - ✅ Windows (EXE)
          draft: false
          prerelease: false

      - name: Upload Release Asset (Android)
        id: upload-android-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/apk/app-release.apk
          asset_name: FloridaPredictor-v${{ env.BUILD_VERSION }}-android.apk
          asset_content_type: application/vnd.android.package-archive

  # ============================================
  # 💻 JOB 2: WINDOWS EXE
  # ============================================
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flet Build Windows
        run: |
          flutter config --no-analytics
          flet build windows --verbose

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: windows-exe
          path: build/windows/x64/runner/Release/
          if-no-files-found: error
          overwrite: false

      - name: Upload Release Asset (Windows)
        id: upload-windows-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/windows/x64/runner/Release/FloridaPredictor.exe
          asset_name: FloridaPredictor-v${{ env.BUILD_VERSION }}-windows.zip
          asset_content_type: application/zip